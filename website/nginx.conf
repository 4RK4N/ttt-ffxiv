# Internal HTTP only — TLS is handled by caddy-docker-proxy (Let's Encrypt).
# Must match caddy.reverse_proxy upstream in docker-compose.yml (8089).
server {
    listen 8089;
    server_name localhost;
    root /var/www/public;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript text/html image/svg+xml;
    gzip_min_length 256;

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Astro build output with content hashes in the filenames — safe to cache forever.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}

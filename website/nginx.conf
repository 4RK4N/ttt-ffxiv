# Internal HTTP only — TLS is handled by caddy-docker-proxy (Let's Encrypt).
# Must match caddy.reverse_proxy upstream in docker-compose.yml (8089).
server {
    listen 8089;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    add_header X-Frame-Options "DENY" always;

    gzip on;
    gzip_types text/css application/javascript text/html image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Astro build output with content hashes in the filenames — safe to cache forever.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location = /de {
        return 301 /de.html;
    }

    location = /de/ {
        return 301 /de.html;
    }

    location = /en {
        return 301 /;
    }

    location = /en/ {
        return 301 /;
    }
}

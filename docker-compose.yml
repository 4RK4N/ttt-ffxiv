# The caddy-docker-proxy network is created by your Caddy stack; we just join it.

networks:
  caddy:
    external: true

services:
  ttt-discord-bot:
    build:
      context: .
      dockerfile: discord-bot/Dockerfile
      target: ttt-discord-bot
      ulimits:
        nproc: 65535

    image: ttt-discord-bot:1.6.5

    pull_policy: build

    container_name: ttt-discord-bot

    volumes:
      - ./data:/app/data

    networks:
      - caddy

    labels:
      caddy: bot.ttt-ffxiv.com

      caddy.encode: "gzip zstd"

      caddy.header.Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"

      caddy.header.X-Content-Type-Options: "nosniff"

      caddy.header.X-Frame-Options: "SAMEORIGIN"

      caddy.header.Referrer-Policy: "strict-origin-when-cross-origin"

      caddy.header.Cross-Origin-Opener-Policy: "same-origin"

      caddy.header.Permissions-Policy: "camera=(), microphone=(), geolocation=()"

      # CSP is set per-request by web-admin (nonce-based script-src); not duplicated here.

      caddy.reverse_proxy: "{{upstreams 8088}}"

    healthcheck:
      test: ["CMD", "node", "scripts/web-health.mjs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    restart: unless-stopped

  ttt-website:
    build:
      context: .
      dockerfile: website/Dockerfile
      target: ttt-website
      ulimits:
        nproc: 65535

    image: ttt-website:2.0.0

    pull_policy: build

    container_name: ttt-website

    networks:
      - caddy

    labels:
      caddy: ttt-ffxiv.com

      caddy.encode: "gzip zstd"

      caddy.header.Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"

      caddy.header.X-Content-Type-Options: "nosniff"

      caddy.header.X-Frame-Options: "SAMEORIGIN"

      caddy.header.Referrer-Policy: "strict-origin-when-cross-origin"

      caddy.header.Cross-Origin-Opener-Policy: "same-origin"

      caddy.header.Permissions-Policy: "camera=(), microphone=(), geolocation=()"

      caddy.header.Content-Security-Policy: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"

      caddy.reverse_proxy: "{{upstreams 8089}}"

    restart: unless-stopped
